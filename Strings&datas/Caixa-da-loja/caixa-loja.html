<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="img/jpg" href="caixa-loja.jpg">
    <link rel="stylesheet" href="caixa-loja.css">
    <title>Caixa da Loja</title>
</head>
<body>
    <img src ="caixa-loja.jpg" alt="caixa da loja" class="normal">
    <h1>
        Programa Caixa da Loja 
    </h1>
    <form>
        <p>Data de Vencimento:  
        <input type="date" id="inDataVenc" autofocus required>
        </p>
        <p>Valor da Conta R$:
            <input type="number" id="inValor" min = 0 step = "0.01" class = "alinha-direita" required>
            <input type="submit" value = "Calcular Multa e Juros">
        </p>
        <p>Valor da Multa R$:
            <input type = "number" id="outMulta" class = "alinha-direita" readonly>
        </p>
        <p>Valor dos Juros R$: 
            <input type="number" id = "outJuros" class = "alinha-direita" readonly>
        </p>
        <p>Total a Pagar: R$...:
            <input type="number" id="outTotal" class = "alinha-direit" readonly>
            <input type="reset" value="Nova Conta">
        </p>
    </form>
    <h3></h3>
    <script src="caixa-loja.js"></script>
</body>
</html>
