<script>
    const anuncio = prompt("Anúncio: ")
    let numPalavras = 0;
    const tam = anuncio.length
    for ( let i=0 ; i<tam ; i++ ) {
        if (anuncio.charAt(i) == " ") { //não esquecer que charAt e nunca charAT !!
            numPalavras++
        }
    }
    alert(`Anúncio: ${anuncio}\nNº Palavras: ${(numPalavras + 1)}`)
</script>
