<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="img/jpg" href="clubeNat.jpg">
    <link rel="stylesheet" href="clubeNat.css">
    <title>CLUBE DE NATAÇÃO</title>
</head>

<body>
    <img src="clubeNat.jpg" alt="Clube de Natação" class="normal">
    <h1>
        CLUBE DE NATAÇÃO
    </h1>
    <form>
        <p> Nome do(a) atleta:
            <input type="text" id="inNome" autofocus required>
        </p>
        <p> Idade da(o) atleta:
            <input type="number" id="inIdade" required>
        </p>
        <p>
            <input type="submit" value="Categorizar atleta">
            <input type="button" id="btnReset" value="RESET">
        </p>
    </form>
    <pre id="out1"></pre>
    <pre id="out2"></pre>
    <script src="clubeNat.js"></script>
</body>

</html>
