<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Letras Coloridas</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="img/letrasColoridas.jpeg" alt="Letras 
            coloridas">
        </div>
        <div class="right">
                <form>
                    <h1>Letras Coloridas para brincar</h1>

                    <button class="btReset" id="btReset">Reset</button>
                </form>
                <div id="resposta"></div>
        </div>
    </div>
</body>
