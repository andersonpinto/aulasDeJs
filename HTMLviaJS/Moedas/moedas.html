<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href ="imgCoins/moedas.jpg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="moedas.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-5">
                <img src="imgCoins/moedas.jpg" alt="Moedas" class="img-fluid">
            </div>
            <div class="col-sm-7" id ="dvMoedas">
                <form>
                    <h1>Vamos Bincar de Dinheiro ?</h1>
                    <p><label for="inSoma">A soma das moedas exibidas abaixo é:</label>
                        <input type="number" min="0" step="0.05" class="form-control" id="inSoma" required autofocus>
                    </p>
                    <p>
                        <input type="submit" class="btn btn-primary" value="Conferir Resposta">
                        <input type="reset" class="btn btn-danger" value="Exibir Novas Moedas">
                    </p>
                </form>
            </div>
        </div>
    </div>
    <script src="moedas.js"></script>
</body>
</html>
