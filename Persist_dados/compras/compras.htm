<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="compras.jpg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
        crossorigin="anonymous">
    <link rel="stylesheet" href="compras.css">
    <title>Supermercado</title>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-3">
                <img src="compras.jpg" class="img-fluid" alt="compras online">
            </div>
            <div class="col-9">
                <h3>Supermercado Sabiá</h3>
                <p></p>
                <h4>Faça aqui as suas compras online</h4>
            </div>
            <div class="row">
                <div>
                    <label for="inProduto">Produto: </label><br>
                    <input type="text" id="inProduto" required autofocus>
                    <div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col-3">
                            <button type="button" class="btn btn-primary" id="btCadastro">Adicionar Produto</button>
                        </div>
                        <div class="col-2">
                            <button class="btn btn-danger" id="btLimpar">Limpar a lista</button>
                        </div>
                    </div>
                    <div class="row justify-content-center">
                        <h4 id="resposta1"></h4>
                        <h4 id="resposta2"></h4>
                    </div>
                </div>
            </div>
            <script src="compras.js"></script>
</body>

</html>
