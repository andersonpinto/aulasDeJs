<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="lojEsp.jpg">
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <link rel="stylesheet" href="lojEsp.css">
        <title>Loja de Esportes</title>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row" id="divTitulo">
                <div class="col-sm-7">
                    <h1>Loja de Esportes Avenida</h1>
                    <h2>Produtos esportivos em geral</h2>
                </div>
                <div class="col-sm-3">
                    <h5>Qual clube você torce?</h5>
                    <form>
                        <input type="radio" name="clube" id="rbBrasil">Brasil<br>
                        <input type="radio" name="clube" id="rbPelotas">Pelotas<br>
                        <input type="radio" name="clube" id="rbFarroupilha">Farroupilha<br> 
                        <input type="radio" name="clube" id="rbNenhum">Nenhum<br>
                    </form>
                </div>
                <div class="col-sm-2">
                    <img id="imgClube" class="d-none">
                </div>
            </div>
        </div>
        <script src="lojEsp3.js"></script>
    </body>
</html>
